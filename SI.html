<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Impact: Ultra Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>

    <div id="ui-wrapper">
        
        <aside id="scoreboard">
            <h3>TOP PILOTS</h3>
            <ul id="score-list">
                <li id="player-high-score">3. YOU - 0</li>
            </ul>

            <button id="fullscreen-btn">⛶ FULLSCREEN</button>

            <div id="flight-manual" class="glass-panel instructions">
    <h3>FLIGHT MANUAL</h3>
    <ul>
        <li><span>ARROWS <b>↑ ↓ ← →</b></span> : NAVIGATE</li>
        <li><span>SPACE</span> : FIRE CANNONS</li>
        <li><span>P / ESC</span> : PAUSE GAME</li>
        <li><span>Q</span> : QUIT MISSION</li>
    </ul>
</div>
        </aside>

        <main id="game-container">
            
            <div id="login-screen">
    <div class="glass-box">
        <h1 class="game-header">METEOR BLAST<br><span>PILOT REGISTRATION</span></h1>
        <input type="text" id="player-initials" maxlength="20" autocomplete="off" placeholder="NICKNAME" autofocus>
        <button id="start-btn" class="glass-button">ENGAGE ENGINES</button>
    </div>
</div>

            <div id="game-ui">
                <div id="score" class="score">Score: 0</div>
                <div id="health-bar-container">
                    <span id="shield-label">SHIELD</span>
                    <div id="health-bar-bg">
                    <div id="health-bar-fill"></div>
                    </div>
                </div>
                <div id="close-btn" title="Stop Mission"></div>
            </div>

            <canvas id="gameCanvas"></canvas>
            <div id="ui-container">
    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>
    <button id="mobile-fire-btn">FIRE</button>
</div>
            <button id="quit-btn">QUIT MISSION</button>
        <a href="/" id="back-btn" class="glass-button" style="position:fixed;top:1rem;right:1rem;z-index:999;padding:0.5rem 1rem;background:rgba(0,245,160,0.2);border:1px solid #00F5A0;border-radius:8px;color:#00F5A0;text-decoration:none;font-size:0.8rem;">← BACK</a>
            <div id="quit-modal" class="modal-overlay" style="display: none;">
    <div class="glass-modal">
        <h2>ABANDON MISSION?</h2>
        <p>Your current score will be lost.</p>
        <div class="modal-buttons">
            <button id="confirm-quit" class="modal-btn danger">ABANDON</button>
            <button id="cancel-quit" class="modal-btn">STAY</button>
        </div>
    </div>
</div>

<div id="loading-spinner" style="display: none;">
    <div class="radar"></div>
    <p>UPLOADING DATA...</p>
</div>
            
        </main>

    </div>

    <div id="starfield"></div>

    <script src="game.js"></script>
</body>
</html>
